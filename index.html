<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home – Smart Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #0f1117;
    --card:   #1a1d27;
    --border: #2e3244;
    --gold:   #c9a84c;
    --gold2:  #f0d080;
    --text:   #e8e4d9;
    --muted:  #8a8899;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -5%, rgba(201,168,76,.1) 0%, transparent 65%);
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(15,17,23,.85);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
  }

  .nav-links { display: flex; gap: 8px; }

  .nav-links a {
    text-decoration: none;
    color: var(--muted);
    font-size: .9rem;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    transition: color .2s, background .2s;
  }

  .nav-links a:hover { color: var(--text); background: rgba(255,255,255,.05); }

  .nav-links a.logout {
    color: #e07070;
    border: 1px solid rgba(224,112,112,.3);
  }
  .nav-links a.logout:hover { background: rgba(224,112,112,.1); }

  .hero {
    text-align: center;
    padding: 100px 24px 80px;
    animation: fadeUp .6s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(28px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .hero-tag {
    display: inline-block;
    font-size: .75rem;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,.4);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 6vw, 5rem);
    line-height: 1.1;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--text) 40%, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 500px;
    margin: 0 auto 44px;
    line-height: 1.7;
  }

  .cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 0 24px 100px;
    animation: fadeUp .7s .1s ease both;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 32px;
    width: 220px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: transform .25s, border-color .25s, box-shadow .25s;
  }

  .card:hover {
    transform: translateY(-6px);
    border-color: var(--gold);
    box-shadow: 0 20px 50px rgba(201,168,76,.12);
  }

  .card-icon { font-size: 2.4rem; margin-bottom: 14px; }
  .card-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
  .card-desc { font-size: .85rem; color: var(--muted); line-height: 1.5; }

  footer {
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: .82rem;
  }
</style>
</head>
<body>

<nav>
  <span class="nav-logo">📚 SmartLibrary</span>
  <div class="nav-links">
    <a href="books.html">Books</a>
    <a href="order.html">Order</a>
    <a href="login.html" class="logout">Logout 🚪</a>
  </div>
</nav>

<section class="hero">
  <span class="hero-tag">Welcome Back</span>
  <h1>Your Smart<br>Library</h1>
  <p>Explore a curated collection of books and order your favorites with ease.</p>
</section>

<div class="cards">
  <a class="card" href="books.html">
    <div class="card-icon">📖</div>
    <div class="card-title">View Books</div>
    <div class="card-desc">Browse our full collection of titles</div>
  </a>
  <a class="card" href="order.html">
    <div class="card-icon">📝</div>
    <div class="card-title">Order a Book</div>
    <div class="card-desc">Request any book delivered to you</div>
  </a>
</div>

<footer>Smart Library © 2025 · Created by Zain</footer>

</body>
</html>
