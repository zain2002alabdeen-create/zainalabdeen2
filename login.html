<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Smart Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --card:     #1a1d27;
    --border:   #2e3244;
    --gold:     #c9a84c;
    --gold2:    #f0d080;
    --text:     #e8e4d9;
    --muted:    #8a8899;
    --input-bg: #12141e;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 70%);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 44px 44px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: fadeUp .5s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold);
    text-align: center;
    letter-spacing: .5px;
    margin-bottom: 6px;
  }

  .logo span { color: var(--text); }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: .9rem;
    margin-bottom: 36px;
  }

  label {
    display: block;
    font-size: .78rem;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color .25s, box-shadow .25s;
    margin-bottom: 22px;
  }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,.15);
  }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0f1117;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: .5px;
    transition: opacity .2s, transform .15s;
    margin-top: 4px;
  }

  button:hover  { opacity: .9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: .8rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">📚 Smart<span>Library</span></div>
  <p class="subtitle">Sign in to your account</p>

  <form action="index.html">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" required>

    <label for="pass">Password</label>
    <input type="password" id="pass" placeholder="••••••••" required>

    <button type="submit">Login →</button>
  </form>

  <p class="footer">Smart Library © 2025 · Created by Zain</p>
</div>

</body>
</html>س
